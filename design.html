- Set up Loss function.

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neural Network Playground</title>
  <link rel="icon" type="image/x-icon" href="logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="finalstyle.css" />
</head>
<body>
<nav class="hdr">

  <!-- Section 1: Pause / Reset -->
  <div class="seg">
    <button class="btn" id="pauseBtn" title="Pause / Resume">
      <svg id="pauseIcon" viewBox="0 0 12 12">
        <rect x="1.0" y="1" width="3.5" height="30" rx="1"/>
        <rect x="7"   y="1" width="3.5" height="30" rx="1"/>
      </svg>
    </button>
    <button class="btn" id="resetBtn" title="Reset" style="opacity:0.6;">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 6A4 4 0 1 1 6 2.1"/>
        <polygon points="6,1 8.4,3.2 5.6,3.2" fill="currentColor" stroke="none"/>
      </svg>
    </button>
  </div>

  <!-- Section 2: Epoch -->
  <div class="seg">
    <div style="display:flex;flex-direction:column;gap:1px;">
      <div class="mono-label">epoch</div>
      <div style="display:flex;align-items:center;gap:5px;">
        <div class="mono-val" id="epochVal">0042</div>
        <div class="dot" id="dot"></div>
      </div>
    </div>
  </div>

  <!-- Section 3: Learning Rate -->
  <div class="seg">
    <div style="display:flex;flex-direction:column;gap:1px;flex-shrink:0;">
      <div class="mono-label">learning rate</div>
      <div class="mono-val" id="lrVal">0.001</div>
    </div>
    <div style="display:flex;align-items:center;gap:6px;flex:1;">
      <span class="mono-label" style="font-size:8px;white-space:nowrap;">0.001</span>
      <input type="range" class="lr-slider" id="lrSlider" min="1" max="100" step="1" value="1"/>
      <span class="mono-label" style="font-size:8px;white-space:nowrap;">0.100</span>
    </div>
  </div>
</nav>

<div class="left-sidebar-grid">
    <section class="left-sidebar" style="font-size: 30px;">Controls
         <p>Dataset</p>
         <div style="padding-bottom: 20px;">
            <div class="divSquare"><img src=img/circle.jpg></div>
            <div class="divSquare"><img src=img/xor.jpg></div>
            <div style='clear:both'></div>
            <div class="divSquare"><img src=img/gaussian.jpg></div>
            <div class="divSquare"><img src=img/spiral.jpg></div>
            <div style='clear:both'></div>
         </div>
         <p>Hidden Neurons <br>
            <input type="range" class="controls-lr-slider" id="hiddenSlider" min="1" max="8" step="1" value="4"/>         </p>
         <p>Train % <br>
            <input type="range" class="controls-lr-slider" id="trainSlider" min="10" max="90" step="1" value="50"/>         </p>
         <p>Noise <br>
            <input type="range" class="controls-lr-slider" id="noiseSlider" min="0" max="50" step="1" value="0"/>         </p>
         <p><input type="checkbox"> Show Training Data</p>

         <h2 style="font-size: 30px; padding-top: 20px;">Information</h2>
          <p>Dataset: <span id="infoDataset">Circle</span></p> 
          <p>Hidden: <span id="infoHidden">4</span></p> 
          <p>Train: <span id="infoTrain">50%</span></p>
          <p>Noise: <span id="infoNoise">0</span></p>
          <p>Train Loss: <span id="infoTrainLoss">0.00000</span></p>
          <p>Test Loss: <span id="infoTestLoss">0.00000</span></p>
    </section>
    <main class="main-content" style="margin: auto;">
        <canvas id="plot" width="600" height="600" style="background-color: rgb(182, 193, 193);"></canvas>
    </main>
    <main class="loss-function" style="margin: auto;">
        <p>Loss Function</p>
        <canvas id="lossPlot" width="320" style="background-color: rgb(155, 164, 172);"></canvas>
    </main>
</div>
 
<script>
  const lrSlider = document.getElementById('lrSlider');  
  const hiddenSlider = document.getElementById('hiddenSlider');
  const trainSlider = document.getElementById('trainSlider');
  const noiseSlider = document.getElementById('noiseSlider');
  const lrVal = document.getElementById('lrVal');

  const infoDataset = document.getElementById('infoDataset');
  const infoHidden = document.getElementById('infoHidden');
  const infoTrain = document.getElementById('infoTrain');
  const infoNoise = document.getElementById('infoNoise');
  const infoTrainLoss = document.getElementById('infoTrainLoss');
  const infoTestLoss = document.getElementById('infoTestLoss');
 
  lrSlider.addEventListener('input', () => {
    lrVal.textContent = (parseInt(lrSlider.value) / 1000).toFixed(3);
  });

  hiddenSlider.addEventListener('input', () => {
  console.log("Hidden:", hiddenSlider.value);
  });

  trainSlider.addEventListener('input', () => {
    console.log("Train %:", trainSlider.value);
  });

  noiseSlider.addEventListener('input', () => {
    console.log("Noise:", noiseSlider.value);
  });

  function updateInfo() {
  infoDataset.textContent = 'Circle'; // change later when dataset buttons work
  infoHidden.textContent = hiddenSlider.value;
  infoTrain.textContent = `${trainSlider.value}%`;
  infoNoise.textContent = `${noiseSlider.value / 100}`;
}

lrSlider.addEventListener('input', () => {
  lrVal.textContent = (parseInt(lrSlider.value) / 1000).toFixed(3);
  updateInfo();
});

hiddenSlider.addEventListener('input', () => {
  updateInfo();
});

trainSlider.addEventListener('input', () => {
  updateInfo();
});

noiseSlider.addEventListener('input', () => {
  updateInfo();
});


  function syncPlaybackUI() {
    pauseIcon.innerHTML = paused ? PLAY : PAUSE;
    dot.className = paused ? 'dot off' : 'dot';
  }

  let paused = true;
let epoch = 0;

const pauseBtn = document.getElementById('pauseBtn');
const pauseIcon = document.getElementById('pauseIcon');
const epochVal = document.getElementById('epochVal');
const dot = document.getElementById('dot');
const resetBtn = document.getElementById('resetBtn');

const PLAY = '<polygon points="2.5,1.5 10,6 2.5,10.5"/>';
const PAUSE = '<rect x="1.5" y="1" width="3.5" height="10" rx="1"/><rect x="7" y="1" width="3.5" height="10" rx="1"/>';

function syncPlaybackUI() {
  pauseIcon.innerHTML = paused ? PLAY : PAUSE;
  dot.className = paused ? 'dot off' : 'dot';
}

function fmt(n) {
  return String(n).padStart(6, '0').replace(/(\d{3})(\d{3})/, '$1,$2');
}

function render() {
  epochVal.textContent = fmt(epoch);
}

pauseBtn.addEventListener('click', () => {
  paused = !paused;
  syncPlaybackUI();
});

resetBtn.addEventListener('click', () => {
  epoch = 0;
  paused = true;
  syncPlaybackUI();
  render();
});

syncPlaybackUI();
render();
updateInfo();

  // 1 epoch per tick, every 20ms = 50 epochs per second
  setInterval(() => {
    if (!paused) {
      epoch += 1;
      render();
    }
  }, 20);
 
  render();

  document.querySelectorAll('.slider-row input[type=range]').forEach(input => {
    const out = document.getElementById(input.dataset.out);
    input.addEventListener('input', () => {
      out.textContent = (parseInt(input.value) / 100).toFixed(2);
    });
  });
 
  document.querySelectorAll('.img-card input[type=file]').forEach(inp => {
    inp.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const idx   = inp.dataset.card;
      const card  = document.getElementById('imgCard' + idx);
      const thumb = document.getElementById('imgThumb' + idx);
      const reader = new FileReader();
      reader.onload = ev => {
        thumb.src = ev.target.result;
        card.classList.add('has-image', 'selected');
      };
      reader.readAsDataURL(file);
    });
  });
</script>

</body>
</html>
