<!-- 
 Left Panel: Controls
 Center: Main Canvas
 Right: Network Diagram
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini TensorFlow Playground</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="controls">
      <h2>Controls</h2>

      <label>
        Learning Rate
        <input type="range" id="lr" min="0.001" max="0.1" step="0.001" value="0.03" />
      </label>

      <label>
        Hidden Neurons
        <input type="range" id="hidden" min="1" max="8" step="1" value="4" />
      </label>

      <button id="trainBtn">Train</button>
      <button id="resetBtn">Reset</button>

      <p id="status">Ready</p>
    </aside>

    <main class="main">
      <canvas id="plot" width="500" height="500"></canvas>
      <canvas id="lossPlot" width="250" height="120"></canvas>
    </main>

    <label>
    <input type="checkbox" id="showTrainData" checked />
    Show Training Data
    </label>

    <label>
    Train %
    <input type="range" id="trainSplit" min="10" max="90" step="5" value="50" />
    </label>
    <p id="trainSplitValue">50%</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
